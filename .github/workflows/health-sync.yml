name: Apple Health Sync

on:
  repository_dispatch:
    types: [health-sync]
  workflow_dispatch:
    inputs:
      health_data:
        description: 'JSON health data from iPhone Shortcut'
        required: false

concurrency:
  group: data-sync   # shared with strava-sync to prevent simultaneous data.json writes
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync health data and push
        env:
          HEALTH_DATA: ${{ github.event.client_payload.health_data || inputs.health_data }}
        run: |
          git config user.name "workout-OS bot"
          git config user.email "bot@workout-os"

          # Pull latest BEFORE processing so the script merges into current data.json
          git pull --rebase
          node .github/scripts/health-sync.js
          git add data.json

          # Nothing changed — exit cleanly
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "health sync $(date -u +%Y-%m-%d)"

          # Retry push up to 3 times in case a concurrent push lands between
          # our pull and our push (tiny window but possible).
          # Each retry: re-pull, re-run script (idempotent upsert), amend commit.
          for attempt in 1 2 3; do
            git push && exit 0
            echo "Push failed (attempt $attempt/3) — re-syncing and retrying..."
            git pull --rebase
            node .github/scripts/health-sync.js
            git add data.json
            git diff --staged --quiet || git commit --amend --no-edit
          done

          echo "ERROR: all 3 push attempts failed" && exit 1
