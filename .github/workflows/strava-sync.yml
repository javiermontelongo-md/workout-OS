name: Strava Sync

on:
  schedule:
    - cron: '0 8 * * *'   # midnight PST / 1am PDT nightly fallback
  workflow_dispatch:
  repository_dispatch:
    types: [strava-activity]  # triggered by Cloudflare webhook relay

concurrency:
  group: data-sync   # shared with health-sync to prevent simultaneous data.json writes
  cancel-in-progress: false  # let an in-flight sync finish; queue next

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync Strava data and push
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          git config user.name "workout-OS bot"
          git config user.email "bot@workout-os"

          # Pull latest BEFORE processing so the script reads current data.json
          # (prevents the script from committing stale data that omits prescriptions
          # or other fields written by the browser between checkout and script run)
          git pull --rebase
          node .github/scripts/strava-sync.js
          git add data.json

          # Nothing changed — exit cleanly
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "strava sync $(date -u +%Y-%m-%d)"

          # Retry push up to 3 times in case a concurrent push lands between
          # our pull and our push (matches health-sync.yml pattern)
          for attempt in 1 2 3; do
            git push && exit 0
            echo "Push failed (attempt $attempt/3) — re-syncing and retrying..."
            git pull --rebase
            node .github/scripts/strava-sync.js
            git add data.json
            git diff --staged --quiet || git commit --amend --no-edit
          done

          echo "ERROR: all 3 push attempts failed" && exit 1
