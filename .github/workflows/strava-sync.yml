name: Strava Sync

on:
  schedule:
    - cron: '0 8 * * *'   # midnight PST / 1am PDT nightly fallback
  workflow_dispatch:
  repository_dispatch:
    types: [strava-activity]  # triggered by Cloudflare webhook relay

concurrency:
  group: strava-sync
  cancel-in-progress: false  # let an in-flight sync finish; queue next

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Strava sync
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: node .github/scripts/strava-sync.js

      - name: Commit and push if data changed
        run: |
          git config user.name "workout-OS bot"
          git config user.email "bot@workout-os"
          git add data.json
          git diff --staged --quiet || git commit -m "strava sync $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
